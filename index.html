<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Watermarker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font: 13px/1.5 system-ui, -apple-system, sans-serif;
    background: #1e1e1e;
    color: #ccc;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  .toolbar {
    display: none;
    padding: 8px 12px;
    background: #252526;
    border-bottom: 1px solid #3c3c3c;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .toolbar .tb-title { font-size: 13px; font-weight: 600; color: #ccc; flex: 1; }
  .toolbar button {
    padding: 6px 12px; border: none; border-radius: 4px;
    font-size: 12px; cursor: pointer; background: #3c3c3c; color: #ccc; white-space: nowrap;
  }
  .toolbar button.accent { background: #0e639c; color: #fff; }

  .layout { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 300px; min-width: 300px; background: #252526;
    border-right: 1px solid #3c3c3c;
    display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 12px 16px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: #888;
    border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
  }
  .sidebar-scroll { flex: 1; overflow-y: auto; }
  .control-group { padding: 10px 16px; border-bottom: 1px solid #333; }
  .control-group label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
  .control-group input[type="text"],
  .control-group input[type="number"],
  .control-group select {
    width: 100%; padding: 6px 8px; background: #3c3c3c; border: 1px solid #555;
    border-radius: 4px; color: #ddd; font-size: 13px; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  .control-group input[type="text"]:focus,
  .control-group input[type="number"]:focus,
  .control-group select:focus { border-color: #007acc; }
  .control-group select optgroup {
    font-style: normal; font-weight: 600; color: #888; background: #2d2d2d;
  }
  .control-group select option { background: #2d2d2d; color: #ddd; padding: 4px; }
  .control-group input[type="color"] {
    width: 36px; height: 30px; padding: 2px; background: #3c3c3c;
    border: 1px solid #555; border-radius: 4px; cursor: pointer;
  }
  .row { display: flex; gap: 8px; align-items: center; }
  .row > * { flex: 1; }
  .row > .fixed { flex: 0 0 auto; }
  .range-val { font-size: 11px; color: #888; min-width: 36px; text-align: right; }
  input[type="range"] { width: 100%; accent-color: #007acc; }
  .btn {
    display: block; width: 100%; padding: 8px 12px; border: none;
    border-radius: 4px; font-size: 13px; cursor: pointer; text-align: center; margin-bottom: 6px;
  }
  .btn-primary { background: #0e639c; color: #fff; }
  .btn-primary:hover { background: #1177bb; }
  .btn-primary:active { background: #0d5589; }
  .btn-secondary { background: #3c3c3c; color: #ccc; }
  .btn-secondary:hover { background: #4a4a4a; }
  .btn-secondary:active { background: #333; }

  .main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #1a1a1a; position: relative; overflow: auto; min-height: 0;
  }
  .drop-zone {
    width: 100%; height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #555; font-size: 14px; gap: 8px;
  }
  .drop-zone .dz-icon { font-size: 32px; opacity: 0.4; }
  .drop-zone.drag-over { color: #007acc; background: rgba(0,122,204,0.05); }
  .preview-container { position: relative; max-width: 100%; max-height: 100%; }
  .preview-container img, .preview-container canvas {
    max-width: 100%; max-height: 100%; object-fit: contain; display: block;
  }
  .status-bar {
    padding: 6px 16px; background: #007acc; color: #fff;
    font-size: 11px; position: fixed; bottom: 0; left: 0; right: 0; display: none; z-index: 100;
  }
  .status-bar.show { display: block; }
  .hidden-file { display: none; }
  #customFontInput { margin-top: 6px; }
  .sidebar-actions { padding: 10px 16px; border-top: 1px solid #3c3c3c; flex-shrink: 0; }

  @media (max-width: 768px) {
    .toolbar { display: flex; }
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%; min-width: 0; max-height: 0; overflow: hidden;
      border-right: none; border-top: 1px solid #3c3c3c;
      transition: max-height 0.25s ease; order: 2;
    }
    .sidebar.open { max-height: 60vh; max-height: 60dvh; overflow-y: auto; }
    .sidebar-header { display: none; }
    .main { order: 1; flex: 1; }
    .control-group { padding: 8px 12px; }
    .control-group label { font-size: 12px; }
    .control-group input[type="text"],
    .control-group input[type="number"],
    .control-group select { padding: 8px 10px; font-size: 14px; }
    .btn { padding: 10px 12px; font-size: 14px; }
    input[type="range"] { height: 24px; }
    .sidebar-actions { display: flex; gap: 8px; padding: 8px 12px; }
    .sidebar-actions .btn { margin-bottom: 0; flex: 1; }
  }

  @media (max-width: 400px) {
    .toolbar button { font-size: 11px; padding: 5px 8px; }
    .toolbar .tb-title { font-size: 12px; }
    .control-group input[type="text"],
    .control-group input[type="number"],
    .control-group select { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <span class="tb-title">Watermarker</span>
  <button id="tbPickBtn" class="accent">选择图片</button>
  <button id="tbSettingsBtn">⚙ 设置</button>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">水印设置</div>
    <div class="sidebar-scroll">
      <div class="control-group">
        <label>水印文字</label>
        <input type="text" id="markText" value="Watermark" placeholder="输入水印文字">
      </div>
      <div class="control-group">
        <label>字体</label>
        <select id="fontSelect">
          <optgroup label="── 通用字体 ──">
            <option value="Arial, sans-serif">Arial</option>
            <option value="'Times New Roman', serif">Times New Roman</option>
            <option value="'Courier New', monospace">Courier New</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="Verdana, sans-serif">Verdana</option>
            <option value="Tahoma, sans-serif">Tahoma</option>
            <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
            <option value="Impact, sans-serif">Impact</option>
          </optgroup>
          <optgroup label="── macOS 中文字体 ──">
            <option value="'PingFang SC', sans-serif">PingFang SC (苹方)</option>
            <option value="'PingFang TC', sans-serif">PingFang TC (苹方-繁)</option>
            <option value="'Hiragino Sans GB', sans-serif">Hiragino Sans GB (冬青黑体)</option>
            <option value="'STSong', serif">STSong (华文宋体)</option>
            <option value="'STHeiti', sans-serif">STHeiti (华文黑体)</option>
          </optgroup>
          <optgroup label="── Windows 中文字体 ──">
            <option value="'Microsoft YaHei', sans-serif">Microsoft YaHei (微软雅黑)</option>
            <option value="SimSun, serif">SimSun (宋体)</option>
            <option value="SimHei, sans-serif">SimHei (黑体)</option>
            <option value="KaiTi, serif">KaiTi (楷体)</option>
            <option value="FangSong, serif">FangSong (仿宋)</option>
          </optgroup>
          <optgroup label="── Linux 中文字体 ──">
            <option value="'Noto Sans SC', sans-serif">Noto Sans SC (思源黑体)</option>
            <option value="'Noto Serif SC', serif">Noto Serif SC (思源宋体)</option>
            <option value="'WenQuanYi Micro Hei', sans-serif">WenQuanYi Micro Hei (文泉驿微米黑)</option>
            <option value="'WenQuanYi Zen Hei', sans-serif">WenQuanYi Zen Hei (文泉驿正黑)</option>
          </optgroup>
          <optgroup label="── 日/韩字体 ──">
            <option value="'Hiragino Sans', sans-serif">Hiragino Sans</option>
            <option value="'Hiragino Kaku Gothic ProN', sans-serif">Hiragino Kaku Gothic ProN</option>
            <option value="'MS Gothic', sans-serif">MS Gothic</option>
            <option value="'Malgun Gothic', sans-serif">Malgun Gothic (맑은 고딕)</option>
          </optgroup>
          <option value="__custom__">其他字体（手动输入）...</option>
        </select>
        <input type="text" id="customFontInput" placeholder="输入字体名称，如 'Fira Code'" style="display:none">
      </div>
      <div class="control-group">
        <div class="row">
          <label style="flex:1">字号</label>
          <span class="range-val fixed" id="sizeVal">48</span>
        </div>
        <input type="range" id="size" min="8" max="200" value="48">
      </div>
      <div class="control-group">
        <label>颜色</label>
        <div class="row">
          <input type="color" id="color" value="#8B8B1B" class="fixed">
          <input type="text" id="colorHex" value="#8B8B1B" style="flex:1">
        </div>
      </div>
      <div class="control-group">
        <div class="row">
          <label style="flex:1">透明度</label>
          <span class="range-val fixed" id="opacityVal">0.15</span>
        </div>
        <input type="range" id="opacity" min="1" max="100" value="15">
      </div>
      <div class="control-group">
        <div class="row">
          <label style="flex:1">间距</label>
          <span class="range-val fixed" id="spaceVal">75</span>
        </div>
        <input type="range" id="space" min="10" max="300" value="75">
      </div>
      <div class="control-group">
        <div class="row">
          <label style="flex:1">旋转角度</label>
          <span class="range-val fixed" id="angleVal">30</span>
        </div>
        <input type="range" id="angle" min="-90" max="90" value="30">
      </div>
      <div class="control-group">
        <label>输出质量 (JPEG)</label>
        <div class="row">
          <input type="range" id="quality" min="10" max="100" value="90">
          <span class="range-val fixed" id="qualityVal">90</span>
        </div>
      </div>
      <div class="control-group">
        <label>输出格式</label>
        <select id="outFormat">
          <option value="image/png">PNG</option>
          <option value="image/jpeg">JPEG</option>
          <option value="image/webp">WebP</option>
        </select>
      </div>
    </div>
    <div class="sidebar-actions">
      <button class="btn btn-primary" id="applyBtn">应用水印</button>
      <button class="btn btn-secondary" id="downloadBtn" disabled>下载图片</button>
      <button class="btn btn-secondary" id="clearBtn">清除</button>
      <input type="file" id="fileInput" class="hidden-file" accept="image/*">
    </div>
  </div>

  <div class="main" id="mainArea">
    <div class="drop-zone" id="dropZone">
      <div class="dz-icon">🖼</div>
      <div>拖放图片到此处或点击选择文件</div>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar"></div>

<script>
(function() {
  const $ = id => document.getElementById(id);

  const markText    = $('markText');
  const fontSelect  = $('fontSelect');
  const customInput = $('customFontInput');
  const sizeSlider  = $('size');
  const colorPicker = $('color');
  const colorHex    = $('colorHex');
  const opacitySlider = $('opacity');
  const spaceSlider = $('space');
  const angleSlider = $('angle');
  const qualitySlider = $('quality');
  const outFormat   = $('outFormat');
  const sizeVal     = $('sizeVal');
  const opacityVal  = $('opacityVal');
  const spaceVal    = $('spaceVal');
  const angleVal    = $('angleVal');
  const qualityVal  = $('qualityVal');
  const applyBtn    = $('applyBtn');
  const downloadBtn = $('downloadBtn');
  const clearBtn    = $('clearBtn');
  const fileInput   = $('fileInput');
  const mainArea    = $('mainArea');
  const dropZone    = $('dropZone');
  const statusBar   = $('statusBar');
  const sidebar     = $('sidebar');

  let originalImage = null;
  let watermarkedBlob = null;

  function getFontFamily() {
    if (fontSelect.value === '__custom__') return customInput.value.trim() || 'Arial, sans-serif';
    return fontSelect.value;
  }

  fontSelect.addEventListener('change', function() {
    if (this.value === '__custom__') { customInput.style.display = ''; customInput.focus(); }
    else { customInput.style.display = 'none'; }
  });

  function status(msg, duration) {
    statusBar.textContent = msg;
    statusBar.classList.add('show');
    if (duration) setTimeout(() => statusBar.classList.remove('show'), duration);
  }

  function syncRange(slider, display, fmt) {
    slider.addEventListener('input', () => { display.textContent = fmt(slider.value); });
  }
  syncRange(sizeSlider, sizeVal, v => v);
  syncRange(opacitySlider, opacityVal, v => (v / 100).toFixed(2));
  syncRange(spaceSlider, spaceVal, v => v);
  syncRange(angleSlider, angleVal, v => v);
  syncRange(qualitySlider, qualityVal, v => v);
  colorPicker.addEventListener('input', () => { colorHex.value = colorPicker.value; });
  colorHex.addEventListener('input', () => {
    if (/^#[0-9a-fA-F]{6}$/.test(colorHex.value)) colorPicker.value = colorHex.value;
  });

  let sidebarOpen = false;
  function toggleSidebar() { sidebarOpen = !sidebarOpen; sidebar.classList.toggle('open', sidebarOpen); }
  function closeSidebar() { sidebarOpen = false; sidebar.classList.remove('open'); }
  $('tbSettingsBtn').addEventListener('click', toggleSidebar);
  $('tbPickBtn').addEventListener('click', () => fileInput.click());

  function loadImage(file) {
    if (!file || !file.type.startsWith('image/')) { status('请选择图片文件', 2000); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        originalImage = img;
        watermarkedBlob = null;
        downloadBtn.disabled = true;
        showPreview(img);
        status('已加载: ' + file.name + ' (' + img.naturalWidth + '×' + img.naturalHeight + ')', 3000);
        if (window.innerWidth <= 768) closeSidebar();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener('change', () => { if (fileInput.files.length) loadImage(fileInput.files[0]); });

  mainArea.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  mainArea.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
  mainArea.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]);
  });
  dropZone.addEventListener('click', () => fileInput.click());

  function showPreview(img) {
    mainArea.innerHTML = '';
    const c = document.createElement('div'); c.className = 'preview-container';
    c.appendChild(img.cloneNode(true));
    mainArea.appendChild(c);
  }

  function showCanvasPreview(canvas) {
    mainArea.innerHTML = '';
    const c = document.createElement('div'); c.className = 'preview-container';
    c.appendChild(canvas);
    mainArea.appendChild(c);
  }

  function renderTextToCanvas(text, font, color) {
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    ctx.font = font;
    const m = ctx.measureText(text);
    c.width = m.width;
    c.height = m.actualBoundingBoxAscent + m.actualBoundingBoxDescent;
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textBaseline = 'top';
    ctx.fillText(text, 0, 0);
    return { canvas: c, width: c.width, height: c.height };
  }

  function applyWatermark() {
    if (!originalImage) { status('请先选择图片', 2000); return; }
    status('正在处理...');

    const text = markText.value || 'Watermark';
    const ff = getFontFamily();
    const { canvas: mk, width: mw, height: mh } = renderTextToCanvas(text, sizeSlider.value + 'px ' + ff, colorPicker.value);

    const ow = originalImage.naturalWidth, oh = originalImage.naturalHeight;
    const cs = Math.ceil(Math.sqrt(ow * ow + oh * oh));
    const sp = parseInt(spaceSlider.value);

    const tile = document.createElement('canvas'); tile.width = cs; tile.height = cs;
    const tc = tile.getContext('2d');
    let y = 0, idx = 0;
    while (y < cs) {
      let x = -Math.floor((mw + sp) * 0.5 * idx);
      idx = (idx + 1) % 2;
      while (x < cs) { tc.drawImage(mk, x, y); x += mw + sp; }
      y += mh + sp;
    }

    const rot = document.createElement('canvas'); rot.width = cs; rot.height = cs;
    const rc = rot.getContext('2d');
    rc.save(); rc.translate(cs / 2, cs / 2);
    rc.rotate(parseInt(angleSlider.value) * Math.PI / 180);
    rc.drawImage(tile, -cs / 2, -cs / 2); rc.restore();

    const out = document.createElement('canvas'); out.width = ow; out.height = oh;
    const oc = out.getContext('2d');
    oc.drawImage(originalImage, 0, 0);
    oc.save(); oc.globalAlpha = parseInt(opacitySlider.value) / 100;
    oc.drawImage(rot, Math.floor((ow - cs) / 2), Math.floor((oh - cs) / 2)); oc.restore();

    out.toBlob(blob => {
      watermarkedBlob = blob;
      downloadBtn.disabled = false;
      showCanvasPreview(out);
      status('水印已应用', 2000);
      if (window.innerWidth <= 768) closeSidebar();
    }, outFormat.value, parseInt(qualitySlider.value) / 100);
  }

  function download() {
    if (!watermarkedBlob) return;
    const ext = outFormat.value === 'image/png' ? 'png' : outFormat.value === 'image/webp' ? 'webp' : 'jpg';
    const url = URL.createObjectURL(watermarkedBlob);
    const a = document.createElement('a'); a.href = url; a.download = 'watermarked.' + ext;
    a.click(); URL.revokeObjectURL(url);
  }

  function clearAll() {
    originalImage = null; watermarkedBlob = null; downloadBtn.disabled = true;
    mainArea.innerHTML = ''; mainArea.appendChild(dropZone); fileInput.value = '';
  }

  applyBtn.addEventListener('click', applyWatermark);
  downloadBtn.addEventListener('click', download);
  clearBtn.addEventListener('click', clearAll);

  function handleResize() {
    if (window.innerWidth > 768) { sidebar.classList.add('open'); sidebarOpen = true; }
    else { sidebar.classList.remove('open'); sidebarOpen = false; }
  }
  handleResize();
  window.addEventListener('resize', handleResize);
})();
</script>
</body>
</html>
